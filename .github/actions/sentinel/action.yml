name: 'Sentinel Security Scan'
description: 'Run sentinel (secrets + deps + misconfigurations) on your repository'
branding:
  icon: shield
  color: blue
inputs:
  args:
    description: 'Arguments passed to sentinel'
    required: false
    default: 'scan all . --fail-on high'
  version:
    description: 'sentinel version to install (go install tag)'
    required: false
    default: 'latest'
  output:
    description: 'Optional file to write stdout to (e.g. results.sarif)'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - name: Install sentinel
      shell: bash
      run: go install github.com/GhanshyamJha05/Sentinel@${{ inputs.version }}
    - name: Run sentinel
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.output }}" ]; then
          sentinel ${{ inputs.args }} | tee "${{ inputs.output }}"
        else
          sentinel ${{ inputs.args }}
        fi
